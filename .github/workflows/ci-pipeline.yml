name: altera-atf-ci-pipeline
###############################################################################
# Altera SOCFPGA ATF Build Pipeline
###############################################################################

on:
  pull_request:
     branches: [ "socfpga_*" ]
     types: [opened, synchronize, reopened, review_requested, review_submission]

  # Allows to run this workflow manually from the Actions tab
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
#This action extracts the new commits and performs checkpatch checks on it.
  ci-checkpatch:
    runs-on: [self-hosted,pg-embedded-runner]
    container:
      image: amr-registry.sc.altera.com/pse-pswe-software-ba/embedded_coverity:ubuntu20.04.0_6-new-proxy-inbuilt
      options: -v /mnt/nfs_share/site/proj/psg:/p/psg
    # Check patch only can run at pull request as it is hard to determine the commit during the push event.
    env:
      GITHUB_EVENT_NAME: ${{ github.event_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # This will pull the whole repo, otherwise cannot compare commit.
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Checkpatch.pl
        run: |
          git config --global --add safe.directory /__w/applications.fpga.soc.arm-trusted-firmware-dev/applications.fpga.soc.arm-trusted-firmware-dev
          git clone https://${{ secrets.GIT_USER }}:${{ secrets.GIT_TOKEN }}@github.com/altera-innersource/applications.devops.build-bot.github-pr-workflow
          cd applications.devops.build-bot.github-pr-workflow
          git checkout master
          bash workflow_Checkpatch.sh ${{ github.workspace }} ${{ github.event.repository.name }} ${{ secrets.GITHUB_TOKEN }} ${{ github.event.pull_request.number }} ${{ github.head_ref }} ${{ github.base_ref }}

  ci-coverity:
    runs-on: [self-hosted,pg-embedded-runner]
    container:
        image: amr-registry.sc.altera.com/pse-pswe-software-ba/embedded_coverity:ubuntu20.04.0_6-cov-2024
    env:
      # Disable the warnings of Security violation. We need to check why this is trigger later, plaintext password.
      EC_DISABLE_VAL: project,system

    steps:
      - uses: actions/checkout@v4
      - name : Download coverity script
        run: |
          git config --global credential.helper store
          git clone https://${{ secrets.GIT_USER }}:${{ secrets.GIT_TOKEN }}@github.com/altera-innersource/applications.devops.build-bot.github-pr-workflow
          cd applications.devops.build-bot.github-pr-workflow
          git checkout master

      - name: Run Coverity Build
        run: |
          cd applications.devops.build-bot.github-pr-workflow
          bash workflow_Coverity.sh ${{ github.workspace }} ${{ github.event.repository.name }} arm-trusted-firmware-github-workflow ${{ github.head_ref }} ${{ github.base_ref }}

      - name: atf-coverity-report-prechange
        uses: actions/upload-artifact@v4
        with:
          name: atf-coverity-report-prechange
          path: ${{ github.workspace }}/atf_output_defect_prechange.json
          retention-days: 1

      - name: atf-coverity-report-postchange
        uses: actions/upload-artifact@v4
        with:
          name: atf-coverity-report-postchange
          path: ${{ github.workspace }}/atf_output_defect_postchange.json
          retention-days: 1

  ci-coverity-parse-result:
    needs: ci-coverity
    runs-on: [self-hosted,pg-embedded-runner]
    container:
        image: amr-registry.sc.altera.com/pse-pswe-software-ba/embedded_coverity:ubuntu20.04.0_6-cov-2024

    steps:
      - name: Download coverity result prechange
        uses: actions/download-artifact@v4
        with:
           name: atf-coverity-report-prechange
      - run: |
          ls
          pwd
          rm -rf /tmp/coverity-result-json
          mkdir /tmp/coverity-result-json
          cp atf_output_defect_prechange.json /tmp/coverity-result-json/
          ls /tmp/coverity-result-json/*

      - name: Download coverity result postchange
        uses: actions/download-artifact@v4
        with:
           name: atf-coverity-report-postchange
      - run: |
          cp atf_output_defect_postchange.json /tmp/coverity-result-json/
          ls /tmp/coverity-result-json/*

      - uses: actions/checkout@v4
      - name : Download coverity parser script
        run: |
          git config --global credential.helper store
          git clone https://${{ secrets.GIT_USER }}:${{ secrets.GIT_TOKEN }}@github.com/altera-innersource/applications.devops.build-bot.github-pr-workflow
          cd applications.devops.build-bot.github-pr-workflow
          git checkout master

      - name : Run Coverity Parser
        run: |
          cd applications.devops.build-bot.github-pr-workflow
          mv /tmp/coverity-result-json/* .
          rm -rf /tmp/coverity-result-json
          bash workflow_Coverity_Parser.sh ${{ github.workspace }} ${{ github.event.repository.name }} ${{ secrets.GITHUB_TOKEN }} ${{ github.event.pull_request.number }}

      - name: atf-coverity-report
        uses: actions/upload-artifact@v4
        with:
          name: atf-coverity-report
          path: atf_output_defect.csv
          retention-days: 1

#This action performs a build test using an ubuntu container.
  ci-build:
    # The type of runner that the job will run on
    runs-on: [self-hosted,pg-embedded-runner]
    container:
        image: amr-registry.sc.altera.com/pse-pswe-software-ba/embedded_coverity:ubuntu20.04.0_6-new-proxy-inbuilt
    env:
      # Disable the warnings of Security violation. We need to check why this is trigger later, plaintext password.
      EC_DISABLE_VAL: project,system
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v4
      - name: ATF Build
        run: |
          DIR=$(pwd)
          git config --global credential.helper store
          git clone https://${{ secrets.GIT_USER }}:${{ secrets.GIT_TOKEN }}@github.com/altera-innersource/applications.devops.build-bot.github-pr-workflow
          cd applications.devops.build-bot.github-pr-workflow
          git checkout master
          bash workflow_Build.sh $DIR ${{ github.event.repository.name }} arm-trusted-firmware-github-workflow

      - name: atf-image
        uses: actions/upload-artifact@v4
        with:
          name: atf-image
          path: ${{ github.workspace }}/atf_output.tar
          retention-days: 1

#This action runs the simic regression test
  ci-verification:
     runs-on: [self-hosted, atf-arc-runner]
     needs: ci-build
     env:
      # Disable the warnings of Security violation. We need to check why this is trigger later, plaintext password.
      EC_DISABLE_VAL: project,system
      GITHUB_EVENT_NAME: ${{ github.event_name }}
     steps:
      - name: Cleaning workspace
        run: |
          rm -rf applications.devops.build-bot.github-pr-workflow
          rm -rf ${GITHUB_WORKSPACE}/.git*

      - name: Download ATF artifacts
        uses: actions/download-artifact@v4
        with:
          name: atf-image
      - run: |
          tar -xvf atf_output.tar
          ls
          pwd

      - name: Simics Regtest
        run: |
          git clone https://${{ secrets.GIT_USER }}:${{ secrets.GIT_TOKEN }}@github.com/altera-innersource/applications.devops.build-bot.github-pr-workflow
          cd applications.devops.build-bot.github-pr-workflow
          git checkout master
          bash workflow_Regtest.sh ${{ github.workspace }} ${{ github.event.repository.name }} ${{ github.event.pull_request.number }}

#This action checks if there is any unaddressed comments or change request
  ci-check-reviews:
    runs-on: [self-hosted,pg-embedded-runner]
    steps:
     - name: Check for unaddressed change requests
       env:
          https_proxy: proxy-dmz.intel.com:912 # If the self-hosted runner has issues with the proxy
       run: |
          tmp_dir=$(mktemp -d -t get-prerequisite-binary-XXXX)
          cd $tmp_dir
          rm -rf applications.devops.build-bot.github-pr-workflow
          git config --global credential.helper store
          git clone https://${{ secrets.GIT_USER }}:${{ secrets.GIT_TOKEN }}@github.com/altera-innersource/applications.devops.build-bot.github-pr-workflow
          cd applications.devops.build-bot.github-pr-workflow
          git checkout master
          bash workflow_Check_Unaddressed_Change_Request.sh ${{ github.workspace }} ${{ github.repository }} ${{ secrets.GITHUB_TOKEN }} ${{ github.event.pull_request.number }}
          rm -fr $tmp_dir

#This is the commit gate that ensures all required checks are passing before the PR is allowed to be merged.
  ci-check-pr-status:
    runs-on: [self-hosted,pg-embedded-runner]
    needs: [ci-coverity-parse-result, ci-verification, ci-checkpatch, ci-check-reviews]
    steps:
     - name: Check for unaddressed change requests
       env:
          https_proxy: proxy-dmz.intel.com:912 # If the self-hosted runner has issues with the proxy
       run: |
          tmp_dir=$(mktemp -d -t get-prerequisite-binary-XXXX)
          cd $tmp_dir
          rm -rf applications.devops.build-bot.github-pr-workflow
          git config --global credential.helper store
          git clone https://${{ secrets.GIT_USER }}:${{ secrets.GIT_TOKEN }}@github.com/altera-innersource/applications.devops.build-bot.github-pr-workflow
          cd applications.devops.build-bot.github-pr-workflow
          git checkout master
          bash workflow_Check_Unaddressed_Change_Request.sh ${{ github.workspace }} ${{ github.repository }} ${{ secrets.GITHUB_TOKEN }} ${{ github.event.pull_request.number }}
          rm -rf $tmp_dir

     - name: On failure
       if: ${{ needs.ci-coverity-parse-result.result != 'success'|| needs.ci-verification.result != 'success' || needs.ci-checkpatch.result != 'success'|| needs.ci-check-reviews.result != 'success' }}
       run: |
          echo "Status check has failed."
          exit 1
